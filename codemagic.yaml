workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    working_directory: ucityapp
    environment:
      flutter: latest
      android_signing:
        - ucityapp_keystore  # Add your keystore in Codemagic: Teams > Code signing > Android
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android App Bundle
        script: flutter build appbundle --release
    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - yminor13@gmail.com
        notify:
          success: true
          failure: true

  ios-release:
    name: iOS Release
    max_build_duration: 120
    working_directory: ucityapp
    environment:
      flutter: latest
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.shymin.thegardenbyucity
      groups:
        - firebase_ios  # Create this group in Codemagic with GOOGLE_SERVICE_INFO_PLIST (base64)
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Set up Firebase GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > ios/Runner/GoogleService-Info.plist
      - name: Build iOS IPA
        script: flutter build ipa --release --export-options-plist=$CM_EXPORT_OPTIONS_PATH
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - yminor13@gmail.com
        notify:
          success: true
          failure: true
